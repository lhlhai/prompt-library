name: Update 100-Days Index

on:
  push:
    paths:
      - '100-days/data/*.json'
      - '!100-days/data/index.json'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update script
        run: python 100-days/update_index.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 100-days/data/index.json
          git diff --staged --quiet || git commit -m "chore: auto-update 100-days index.json"
          git push
          
