<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail - 100 Days of Manual Testing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Navigation -->
    <header>
        <div class="header-container">
            <div class="logo">100 Days of Manual Testing</div>
            <nav>
                <a href="index.html">Home</a>
                <a href="categories.html">Categories</a>
                <a href="#about">About</a>
            </nav>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search knowledge...">
                <button class="theme-toggle">🌙</button>
            </div>
        </div>
    </header>

    <main class="post-detail-container">
        <div class="post-main-content">
            <article id="post-article">
                <!-- Content will be loaded by JavaScript -->
                <div class="loading">Loading post content...</div>
            </article>


        </div>

        <aside class="post-sidebar">
            <div class="sidebar-widget">
                <h4>Related Days</h4>
                <div id="related-posts">
                    <!-- Related posts will be loaded by JavaScript -->
                </div>
                <a href="index.html" class="view-all-btn">VIEW ALL DAYS</a>
            </div>


        </aside>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#linkedin">LinkedIn</a>
                <a href="#github">GitHub</a>
            </div>
            <p>&copy; 2024 The Manual Authority. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Post detail specific logic
        document.addEventListener('DOMContentLoaded', async () => {
            // Wait for data to be loaded from script.js
            let attempts = 0;
            while ((!window.posts || window.posts.length === 0) && attempts < 50) {
                await new Promise(resolve => setTimeout(resolve, 100));
                attempts++;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const postId = parseInt(urlParams.get('id')) || 45; // Default to 45 for demo
            await window.loadPostDetail(postId);
        });
    </script>
</body>
</html>
